# ══════════════════════════════════════════════════════════════════════
# Talos Control Plane Machine Config Patch
#
# Applied to all 3 control plane nodes (talos-cp-1/2/3).
# Merged with the base machine config generated by the Talos provider.
# ══════════════════════════════════════════════════════════════════════

cluster:
  # Allow workloads to be scheduled on control plane nodes.
  # Fine for a homelab — saves resources. Remove for stricter setups.
  allowSchedulingOnControlPlanes: true

  # Disable the default kube-proxy — Cilium replaces it with eBPF.
  proxy:
    disabled: true

  # No built-in CNI — we bootstrap Cilium after cluster is up.
  network:
    name: none

machine:
  network:
    interfaces:
      - interface: eth0
        dhcp: true

        # ── Talos built-in VIP ──────────────────────────────────────
        # A floating IP managed by Talos itself (no kube-vip pod needed).
        # Automatically moves to a healthy control plane node.
        # All kubectl/helm/flux commands should target this IP.
        # Update this to match your cluster_vip variable!
        vip:
          ip: 192.168.1.100   # ← CHANGE THIS to match terraform.tfvars cluster_vip

  kubelet:
    extraArgs:
      # Enable TLS cert rotation for kubelet serving certificates
      rotate-server-certificates: "true"

  # Talos install configuration
  install:
    disk: /dev/sda        # Matches the scsi0 disk in Proxmox VM config
    wipe: false           # Don't wipe on config reapply — only on first install
